<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<title>Gossip Ultimate</title>

<style>
body {
  font-family: Arial;
  background:#0f0f0f;
  color:#fff;
  margin:0;
}

h2 {
  padding:10px;
}

.container {
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  padding:10px;
}

.source-card {
  position:relative;
  border:1px solid #333;
  padding:12px;
  width:160px;
  background:#1a1a1a;
  cursor:pointer;
}

.status-x {
  position:absolute;
  top:6px;
  right:8px;
  color:red;
  font-size:18px;
  font-weight:bold;
}

.source-error {
  opacity:0.4;
}

.feed {
  padding:10px;
}

.item {
  border-bottom:1px solid #333;
  padding:8px 0;
}

a {
  color:#4da6ff;
  text-decoration:none;
}
</style>
</head>

<body>

<h2>🔥 Gossip Ultimate</h2>

<div class="container" id="sources"></div>
<div class="feed" id="feed"></div>

<script>

const sources = [
  {id:"people", name:"People", url:"https://api.rss2json.com/v1/api.json?rss_url=https://people.com/feed"},
  {id:"access", name:"Access", url:"https://api.rss2json.com/v1/api.json?rss_url=https://www.accessonline.com/feed"},
  {id:"ynet", name:"Ynet תרבות", url:"https://api.rss2json.com/v1/api.json?rss_url=https://www.ynet.co.il/Integration/StoryRss538.xml"},
  {id:"mako", name:"Mako סלבס", url:"https://api.rss2json.com/v1/api.json?rss_url=https://www.mako.co.il/rss-articles/entertainment-celebs"}
];

const keywords = [
"celebrity","celeb","star","hollywood","gossip","relationship","breakup","wedding",
"סלב","רכילות","כוכב","מפורסם","שחקן","דוגמנית","זוגיות","פרידה","חתונה"
];

function stripHTML(html){
  const div = document.createElement("div");
  div.innerHTML = html;
  return div.textContent || div.innerText || "";
}

function markError(id){
  const card = document.getElementById("source-"+id);
  const x = document.createElement("div");
  x.className="status-x";
  x.innerText="✖";
  card.appendChild(x);
  card.classList.add("source-error");
}

function renderItems(items){
  const feed = document.getElementById("feed");
  feed.innerHTML="";

  items.slice(0,25).forEach(item=>{
    const div=document.createElement("div");
    div.className="item";

    const cleanTitle = stripHTML(item.title);

    div.innerHTML = `<a href="${item.link}" target="_blank">${cleanTitle}</a>`;
    feed.appendChild(div);
  });
}

function loadSources(){
  const container = document.getElementById("sources");

  sources.forEach(src=>{
    const card = document.createElement("div");
    card.className="source-card";
    card.id="source-"+src.id;
    card.innerText=src.name;
    container.appendChild(card);

    fetch(src.url)
    .then(r=>r.json())
    .then(data=>{
      if(!data.items){
        markError(src.id);
        return;
      }

      const filtered = data.items.filter(item => {
        const text = (item.title + " " + item.link).toLowerCase();
        return keywords.some(k => text.includes(k));
      });

      if(filtered.length === 0){
        markError(src.id);
      } else {
        card.onclick = ()=> renderItems(filtered);
      }
    })
    .catch(()=> markError(src.id));
  });
}

loadSources();

</script>

</body>
</html>
